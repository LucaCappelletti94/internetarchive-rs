# Codecov status configuration. The authoritative coverage gate is the CI
# Coverage job, which runs cargo tarpaulin with --fail-under 95. These statuses
# mirror that contract rather than introducing a second, stricter gate.
coverage:
  status:
    # Fail only when overall coverage falls below the enforced 95 percent floor,
    # not on any decrease versus the base branch. The tarpaulin run that feeds
    # Codecov measures the ring TLS feature set (the default), a slightly
    # different line set than the former all-features run, so a small structural
    # shift versus an all-features baseline is expected and benign.
    project:
      default:
        target: 95%
    # Report patch coverage without failing the build. A legitimate change can
    # add compile-time-only lines (the mutually-exclusive TLS compile_error
    # guards and the inactive cfg provider stub) that can never be covered at
    # runtime, so gating on patch coverage produces false negatives.
    patch:
      default:
        informational: true
