# Supply-chain policy for internetarchive-rs, enforced in CI by `cargo deny check`.
# Metadata is collected with all features so every TLS path (ring, aws-lc, native-tls)
# is covered even though those features are mutually exclusive at compile time.

[graph]
all-features = true

[advisories]
# RUSTSEC advisory database. Vulnerabilities and unmaintained crates are denied by
# default in this cargo-deny version. Add documented entries here only after assessing
# that an advisory does not affect this crate.
ignore = [
    # { id = "RUSTSEC-0000-0000", reason = "why it does not apply" },
]

[licenses]
# Permissive licenses observed across the full dependency tree. Crates published under
# an OR expression (for example "MIT OR Apache-2.0 OR LGPL-2.1-or-later") are satisfied
# by any one allowed term, so copyleft terms in OR expressions need no separate allow.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Unlicense",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions are common in transitive trees, so flag rather than fail.
multiple-versions = "warn"
# Wildcard version requirements are a supply-chain footgun for a published crate.
wildcards = "deny"

[sources]
# Only crates.io is allowed as a source. No git or alternate registries.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
