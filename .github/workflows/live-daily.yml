name: Live Daily

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: internetarchive-live-daily
  cancel-in-progress: false

jobs:
  feature-matrix:
    name: Feature Matrix (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            command: cargo test --locked
          - name: indicatif
            command: cargo test --features indicatif --locked
          - name: all-features
            command: cargo test --all-features --locked
          - name: native-tls
            command: cargo test --no-default-features --features native-tls --locked

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: ${{ matrix.command }}

  live-api-suite:
    name: Live Full API Suite
    runs-on: ubuntu-latest
    needs: feature-matrix
    timeout-minutes: 30
    environment: internetarchive-live
    env:
      RUST_BACKTRACE: "1"
      INTERNET_ARCHIVE_ACCESS_KEY: ${{ secrets.INTERNET_ARCHIVE_ACCESS_KEY }}
      INTERNET_ARCHIVE_SECRET_KEY: ${{ secrets.INTERNET_ARCHIVE_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Validate live credentials
        shell: bash
        run: |
          test -n "$INTERNET_ARCHIVE_ACCESS_KEY" || { echo "Missing INTERNET_ARCHIVE_ACCESS_KEY secret"; exit 1; }
          test -n "$INTERNET_ARCHIVE_SECRET_KEY" || { echo "Missing INTERNET_ARCHIVE_SECRET_KEY secret"; exit 1; }

      - name: Install official Internet Archive Python client
        run: python3 -m pip install --user --upgrade internetarchive

      - name: Probe live create with official Python client
        id: official-client-probe
        shell: bash
        run: |
          set +e
          python3 scripts/live_ia_python_probe.py
          status=$?
          set -e
          if [ "$status" -eq 77 ]; then
            echo "skip-live-suite=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Official Internet Archive client cannot create generated live-test identifiers with these credentials; skipping Rust live suite."
            exit 0
          fi
          exit "$status"

      - name: Run live full API suite
        if: steps.official-client-probe.outputs.skip-live-suite != 'true'
        run: cargo test --test live_smoke --all-features --locked -- --nocapture --test-threads=1
