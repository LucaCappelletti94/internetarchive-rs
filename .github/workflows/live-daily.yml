name: Live Daily

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: internetarchive-live-daily
  cancel-in-progress: false

jobs:
  advisories:
    name: Advisories
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Audit dependencies for new advisories
        run: cargo audit --deny warnings

      - name: Check advisories, licenses, bans, and sources
        run: cargo deny check

  feature-matrix:
    name: Feature Matrix (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            command: cargo test --locked
          - name: indicatif
            command: cargo test --features indicatif --locked
          - name: ring-tls-all
            command: cargo test --no-default-features --features rustls-ring-tls,indicatif --locked
          - name: native-tls
            command: cargo test --no-default-features --features native-tls --locked
          - name: rustls-tls
            command: cargo test --no-default-features --features rustls-tls,indicatif --locked

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: ${{ matrix.command }}

  live-api-suite:
    name: Live Full API Suite
    runs-on: ubuntu-latest
    needs: feature-matrix
    timeout-minutes: 120
    environment: internetarchive-live
    env:
      RUST_BACKTRACE: "1"
      INTERNET_ARCHIVE_ACCESS_KEY: ${{ secrets.INTERNET_ARCHIVE_ACCESS_KEY }}
      INTERNET_ARCHIVE_SECRET_KEY: ${{ secrets.INTERNET_ARCHIVE_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Validate live credentials
        shell: bash
        run: |
          test -n "$INTERNET_ARCHIVE_ACCESS_KEY" || { echo "Missing INTERNET_ARCHIVE_ACCESS_KEY secret"; exit 1; }
          test -n "$INTERNET_ARCHIVE_SECRET_KEY" || { echo "Missing INTERNET_ARCHIVE_SECRET_KEY secret"; exit 1; }

      - name: Run live full API suite
        run: cargo test --test live_smoke --no-default-features --features rustls-ring-tls,indicatif --locked -- --nocapture --test-threads=1
